name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  release:
    types: [created]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: pytest

    - name: Build Artifact
      run: |
        mkdir ../staging_dir
        rsync -av --exclude='.git' . ../staging_dir/
        mv ../staging_dir build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flask-app
        path: build/

  deploy-staging:
    needs: build-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: flask-app

    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.STAGING_KEY }}
        known_hosts: unnecessary_with_strict_checking_off

    - name: Deploy to Staging Server
      run: |
        echo "Deploying to staging..."
        scp -o StrictHostKeyChecking=no -r . ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/ubuntu/staging-deployment

  deploy-production:
    needs: build-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: flask-app
        
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.STAGING_KEY }}
        known_hosts: unnecessary_with_strict_checking_off

    - name: Deploy to Production Server
      run: |
        echo "Deploying to production..."
        scp -o StrictHostKeyChecking=no -r . ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/home/ubuntu/production-deployment
